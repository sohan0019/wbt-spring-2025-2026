<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Donor Information</h1>

    <form method="post">
      <table>
        <tr>
          <td class="label">
            <label for="firstname"
              >First Name <span>*</span></label
            >
          </td>
          <td>
            <input type="text" class="inp" id="firstname" name="firstname" required />
          </td>
        </tr>
        <tr>
          <td class="label">
            <label for="lastname">Last Name <span>*</span></label>
          </td>
          <td>
            <input type="text" class="inp" id="lastname" name="lastname" required />
          </td>
        </tr>
        <tr>
          <td class="label"><label for="company">Company</label></td>
          <td>
            <input type="text" class="inp" name="company" id="company" />
          </td>
        </tr>
        <tr>
          <td class="label">
            <label for="address">Address 1 <span>*</span></label>
          </td>
          <td>
            <input type="text" class="inp" name="address1" id="address1" required />
          </td>
        </tr>
        <tr>
          <td class="label"><label for="address">Address 2</label></td>
          <td>
            <input type="text" class="inp" name="address2" id="address2" />
          </td>
        </tr>
        <tr>
          <td class="label">
            <label for="city">City <span>*</span></label>
          </td>
          <td>
            <input type="text" class="inp" name="city" id="city" required />
          </td>
        </tr>
        <tr>
          <td class="label">
            <label for="state">State <span>*</span></label>
          </td>
          <td>
            <select name="state" id="" class="select" required>
              <option value="" selected disabled>Select a State</option>
              <option value="Dhaka" required>Dhaka</option>
              <option value="Khulna">Khulna</option>
              <option value="Sylhet">Sylhet</option>
              <option value="Cumilla">Cumilla</option>
            </select>
          </td>
        </tr>
        <tr>
          <td class="label">
            <label for="zip">Zip Code <span>*</span></label>
          </td>
          <td>
            <input
              type="text"
              inputmode="numeric"
              name="zip"
              class="inp"
              id="zip"
              required
            />
          </td>
        </tr>
        <tr>
          <td class="label">
            <label for="country">Country <span>*</span></label>
          </td>
          <td>
            <select name="country" id="" class="select" required>
              <option value="" selected disabled>Select a Country</option>
              <option value="Bangladesh">Bangladesh</option>
              <option value="India">India</option>
              <option value="China">China</option>
              <option value="Malaysia">Malaysia</option>
            </select>
          </td>
        </tr>
        <tr>
          <td class="label"><label for="phone">Phone</label></td>
          <td>
            <input type="text" inputmode="numeric" class="inp" name="phone" id="phone" />
          </td>
        </tr>
        <tr>
          <td class="label"><label for="fax">Fax</label></td>
          <td>
            <input type="text" inputmode="numeric" class="inp" name="fax" id="fax" />
          </td>
        </tr>
        <tr>
          <td class="label">
            <label for="email">Email <span>*</span></label>
          </td>
          <td>
            <input type="email" name="email" class="inp" id="email" />
          </td>
        </tr>
        <tr>
          <td class="label">
            <label for="donation"
              >Donation Amount <span>*</span></label
            >
          </td>
          <td>
            <input
              type="radio"
              name="amount"
              value="none"
              class="space"
              required
              checked
            />None <input type="radio" name="amount" value="50" /> $50
            <input type="radio" name="amount" value="75" /> $75
            <input type="radio" name="amount" value="100" /> $100
            <input type="radio" name="amount" value="250" /> $250
            <input type="radio" name="amount" value="other" /> Other
          </td>
        </tr>
        <tr>
          <td class="label light">
            <label for="">
              (Check a button or type <br />
              in your amount)
            </label>
          </td>
          <td>
            <div class="space">
              Other Amount $
              <input type="text" class="inp_lite" name="" id="" />
            </div>
          </td>
        </tr>
        <tr>
          <td class="label">
            <label for="recurring">Recurring Donation</label>
          </td>
          <td>
            <div class="space">
              <input type="checkbox"  name="chk" id="chk" />
              I am interested in giving on a regular basis.
            </div>
          </td>
        </tr>
        <tr>
          <td class="label light">
            <label for=""> (Check if yes) </label>
          </td>
          <td>
            <div class="space">
              Monthly Credit Card $
              <input type="text" class="inp_lite" name="" id="" />
              For
              <input type="text" class="inp_lite" name="" id="" />
              Months
            </div>
          </td>
          <tr>
            <td></td>
            <td>
              <input class="btn space" type="submit" value="Submit" />
              <input class="btn" type="reset" />
            </td>
          </tr>
        </tr>
      </table>
    </form>
  </body>
</html>
